name: BeloteEngine - main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_REGION: europe-west8
  SERVICE_NAME: beloteengine

jobs:
  # ── Job 1: Build & Test ──────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Restore dependencies
        run: dotnet restore BeloteEngine.sln /p:SpaProxyLaunchEnabled=false

      - name: Build
        run: dotnet build BeloteEngine.sln --configuration Release --no-restore /p:SpaProxyLaunchEnabled=false

      - name: Run tests
        run: dotnet test BeloteEngine.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/

  # ── Job 2: Build & verify production Docker image ────────────────────────────
  docker-build-production:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build production Docker image
        run: docker build -f src/BeloteEngine.Api/Dockerfile -t beloteengine:prod src

      - name: Test container starts and is healthy
        run: |
          docker run -d --name test-container \
            -e ASPNETCORE_ENVIRONMENT=Production \
            -e AllowedOrigins=http://localhost \
            -e AllowedHosts="*" \
            -p 8081:8080 \
            beloteengine:prod

          echo "Waiting for container to be healthy..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8081/health; then
              echo "Container is healthy!"
              break
            fi
            echo "Attempt $i/15 — not ready yet..."
            sleep 2
          done

          docker logs test-container
          docker stop test-container
          docker rm test-container

  # ── Job 3: Push image & deploy to Google Cloud Run ───────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          IMAGE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/beloteengine/belote-engine
        run: |
          docker build \
            -f src/BeloteEngine.Api/Dockerfile \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            src
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/beloteengine/belote-engine:${{ github.sha }}

      - name: Show deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
